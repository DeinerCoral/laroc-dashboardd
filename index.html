<head>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#7c3aed;--p2:#a78bfa;--cyan:#06b6d4;--cyan2:#67e8f9;
  --green:#10b981;--green2:rgba(16,185,129,.12);--green3:#064e3b;
  --red:#ef4444;--red2:rgba(239,68,68,.12);--red3:#7f1d1d;
  --amber:#f59e0b;--amber2:rgba(245,158,11,.12);
  --bg:#080b14;--glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.07);--glass3:rgba(255,255,255,.02);
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --shadow-card:0 4px 24px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.05);
}
body{background:var(--bg);color:var(--t1);font-family:'Sora',sans-serif;min-height:100vh;font-size:14px;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
.orb-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.22;animation:orbFloat 12s ease-in-out infinite}
.orb1{width:600px;height:600px;background:radial-gradient(circle,#7c3aed,transparent);top:-200px;right:-100px}
.orb2{width:500px;height:500px;background:radial-gradient(circle,#06b6d4,transparent);bottom:-150px;left:-100px;animation-delay:-6s}
.orb3{width:300px;height:300px;background:radial-gradient(circle,#8b5cf6,transparent);top:50%;left:40%;animation-delay:-3s}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-40px) scale(1.05)}}
/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:230px;background:linear-gradient(180deg,rgba(13,17,23,.98),rgba(8,11,20,.98));border-right:1px solid var(--b1);z-index:100;display:flex;flex-direction:column;backdrop-filter:blur(20px)}
.sidebar-logo{padding:24px 20px 18px;border-bottom:1px solid var(--b1)}
.logo-mark{display:inline-flex;align-items:center;gap:10px}
.logo-hex{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;box-shadow:0 0 20px rgba(124,58,237,.4)}
.logo-text h1{font-size:16px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.logo-text p{font-size:9px;color:var(--t3);margin-top:1px;letter-spacing:.15em;text-transform:uppercase}
.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-section{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.18em;text-transform:uppercase;padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t3);transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--glass2);color:var(--t1)}
.nav-item.active{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(6,182,212,.1));color:var(--t1);font-weight:600;border:1px solid rgba(124,58,237,.25)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:linear-gradient(180deg,#7c3aed,#06b6d4);border-radius:0 2px 2px 0}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{padding:16px;border-top:1px solid var(--b1)}
.bot-status{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--glass);border-radius:10px;border:1px solid var(--b1)}
.bot-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;box-shadow:0 0 12px rgba(124,58,237,.3);flex-shrink:0}
.pulse-live{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--green)}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulseLive 2s infinite}
@keyframes pulseLive{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
/* MAIN */
.main{margin-left:230px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:rgba(8,11,20,.85);border-bottom:1px solid var(--b1);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}
.topbar-title{font-size:16px;font-weight:700;color:var(--t1)}
.topbar-sub{font-size:11px;color:var(--t3)}
.topbar-right{display:flex;align-items:center;gap:10px}
.chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--b1);background:var(--glass);color:var(--t3);transition:.15s}
.chip:hover{border-color:var(--b2);color:var(--t2)}
.chip.active{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4);color:var(--p2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:.2s;font-family:'Sora',sans-serif}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;box-shadow:0 4px 15px rgba(124,58,237,.4)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.5)}
.btn-ghost{background:var(--glass);color:var(--t2);border:1px solid var(--b1)}
.btn-ghost:hover{background:var(--glass2);color:var(--t1)}
/* CARDS */
.card{background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border-radius:16px;border:1px solid var(--b1);box-shadow:var(--shadow-card);padding:20px;position:relative;overflow:hidden;backdrop-filter:blur(10px);transition:border-color .2s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.card:hover{border-color:var(--b2)}
.stat-card{background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border-radius:16px;border:1px solid var(--b1);box-shadow:var(--shadow-card);padding:20px;position:relative;overflow:hidden;backdrop-filter:blur(10px);cursor:default;transition:all .25s}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.stat-card:hover{transform:translateY(-3px);border-color:rgba(124,58,237,.3);box-shadow:var(--shadow-card),0 12px 40px rgba(124,58,237,.15)}
.card-accent-p::after,.card-accent-c::after,.card-accent-g::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;opacity:.6}
.card-accent-p::after{background:linear-gradient(90deg,transparent,var(--p),transparent)}
.card-accent-c::after{background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.card-accent-g::after{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.stat-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.stat-val{font-size:26px;font-weight:800;line-height:1.1;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:var(--t3);margin-top:5px;display:flex;align-items:center;gap:5px}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em}
.badge-green{background:var(--green2);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.badge-red{background:var(--red2);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.badge-amber{background:var(--amber2);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.badge-purple{background:rgba(124,58,237,.15);color:var(--p2);border:1px solid rgba(124,58,237,.25)}
.badge-cyan{background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}
.badge-blue{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.badge-beta{background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;border-radius:6px;font-size:9px;padding:2px 7px}
.div{height:1px;background:var(--b1);margin:14px 0}
/* HEATMAP */
.hm-cell{aspect-ratio:1;border-radius:4px;transition:all .2s;cursor:pointer}
.hm-cell:hover{transform:scale(1.3)}
.hm-0{background:rgba(255,255,255,.04)}.hm-1{background:rgba(124,58,237,.2)}.hm-2{background:rgba(124,58,237,.4)}.hm-3{background:rgba(124,58,237,.6)}.hm-4{background:rgba(124,58,237,.8)}.hm-5{background:#7c3aed;box-shadow:0 0 8px rgba(124,58,237,.6)}
/* CALENDAR */
.cal-day{border:1px solid var(--b1);border-radius:10px;padding:8px;min-height:80px;transition:.2s;cursor:pointer;background:var(--glass3)}
.cal-day:hover{border-color:var(--b2);background:var(--glass)}
.cal-day.win-day{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.04)}
.cal-day.loss-day{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
.cal-num{font-size:11px;font-weight:600;color:var(--t3)}
.cal-pnl-pos{font-size:13px;font-weight:800;color:var(--green)}
.cal-pnl-neg{font-size:13px;font-weight:800;color:var(--red)}
.week-sum{background:var(--glass);border-radius:8px;border:1px solid var(--b1);padding:6px 8px;text-align:center}
/* JOURNAL */
.j-entry{border:1px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:.2s;background:var(--glass3);position:relative;overflow:hidden}
.j-entry::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.j-entry:hover{border-color:var(--b2);background:var(--glass);transform:translateX(2px)}
.j-entry.win-entry{border-left:3px solid var(--green)}
.j-entry.loss-entry{border-left:3px solid var(--red)}
/* LOG */
.log-row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--b1);font-size:11.5px}
.log-row:last-child{border-bottom:none}
.log-time{color:var(--t3);min-width:55px;font-family:'JetBrains Mono',monospace;font-size:10px;flex-shrink:0;padding-top:1px}
/* RING */
.ring-svg{transform:rotate(-90deg)}
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-center{position:absolute;text-align:center}
.score-bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:6px}
.score-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,#7c3aed,#06b6d4)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:10px 14px;border-bottom:1px solid var(--b1)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--b1);font-size:12px}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--glass)}
.avatar{display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;border-radius:10px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:2px}
/* ROBOT CANVAS */
#hero-canvas{display:block;width:100%;height:100%}
.robot-card{position:relative;background:linear-gradient(135deg,rgba(124,58,237,.08),rgba(6,182,212,.05));border-radius:16px;border:1px solid rgba(124,58,237,.2);overflow:hidden;box-shadow:0 0 40px rgba(124,58,237,.08)}
.robot-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.12),transparent 70%);pointer-events:none}
/* ANIMATIONS */
.content{padding:24px 28px;flex:1;position:relative;z-index:1}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cursor-blink{animation:blink 1s step-end infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up-1{animation:fadeUp .5s .05s ease both}.fade-up-2{animation:fadeUp .5s .1s ease both}.fade-up-3{animation:fadeUp .5s .15s ease both}.fade-up-4{animation:fadeUp .5s .2s ease both}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px rgba(124,58,237,.4)}50%{text-shadow:0 0 40px rgba(124,58,237,.8),0 0 60px rgba(6,182,212,.3)}}
.glow-text{animation:glowPulse 3s ease-in-out infinite}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.sec-title::before{content:'';width:3px;height:12px;background:linear-gradient(180deg,#7c3aed,#06b6d4);border-radius:2px;flex-shrink:0}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef}=React;

const DATA={

const isPos=v=>typeof v==='string'?!v.startsWith('-'):v>=0;
const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('es-CO',{minimumFractionDigits:d,maximumFractionDigits:d}):n;
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_SHORT=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

const Ic={
  grid:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,

  chart:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,

  gear:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,

};

/* ════ ROBOT 3D CANVAS — ahora solo en Config ════ */
function RobotCanvas(){
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    let raf,t=0;
    const resize=()=>{canvas.width=canvas.offsetWidth*window.devicePixelRatio;canvas.height=canvas.offsetHeight*window.devicePixelRatio;ctx.scale(window.devicePixelRatio,window.devicePixelRatio)};
    resize();window.addEventListener('resize',resize);
    const candles=Array.from({length:22},(_,i)=>({x:i,open:50+Math.sin(i*.8)*20+Math.random()*10,close:50+Math.sin(i*.8+.4)*20+Math.random()*10,high:0,low:0}));
    candles.forEach(c=>{c.high=Math.max(c.open,c.close)+Math.random()*8;c.low=Math.min(c.open,c.close)-Math.random()*8});
    function draw(){
      const W=canvas.offsetWidth,H=canvas.offsetHeight;
      ctx.clearRect(0,0,W,H);t+=.012;
      const bgG=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.7);
      bgG.addColorStop(0,'rgba(124,58,237,.05)');bgG.addColorStop(1,'transparent');
      ctx.fillStyle=bgG;ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(124,58,237,.06)';ctx.lineWidth=1;
      for(let x=0;x<W;x+=44){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}

function Ring({pct,color='#7c3aed',size=90,stroke=7}){
  const r=(size-stroke*2)/2;const circ=2*Math.PI*r;const off=circ-(pct/100)*circ;
  return(
    <div className="ring-wrap" style={{width:size,height:size}}>
      <svg className="ring-svg" width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{filter:`drop-shadow(0 0 6px ${color})`}}/>
      </svg>
      <div className="ring-center mono" style={{fontSize:size>70?17:13,fontWeight:700,color,lineHeight:1,textShadow:`0 0 10px ${color}`}}>{pct}%</div>
    </div>
  );
}

function CalendarView({trades}){
  const [year,setYear]=useState(2026);const [month,setMonth]=useState(4);
  const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();
  const cells=[];for(let i=0;i<firstDay;i++)cells.push(null);for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const ws={};let wi=0;
  cells.forEach((d,i)=>{if(i>0&&i%7===0)wi++;if(d){const k=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const tr=(trades||{})[k];if(tr)ws[wi]=(ws[wi]||0)+tr.pnl;}});
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button className="btn btn-ghost" style={{padding:'5px 9px'}} onClick={()=>setMonth(m=>m===0?(setYear(y=>y-1),11):m-1)}><span style={{width:13,height:13,display:'flex'}}>{Ic.chevL}</span></button>
          <span style={{fontWeight:700,fontSize:14,color:'#f1f5f9'}}>{MONTHS[month]} {year}</span>
          <button className="btn btn-ghost" style={{padding:'5px 9px'}} onClick={()=>setMonth(m=>m===11?(setYear(y=>y+1),0):m+1)}><span style={{width:13,height:13,display:'flex'}}>{Ic.chevR}</span></button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr) 80px',gap:3,marginBottom:3}}>
        {DAYS_SHORT.map(d=><div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'#475569',padding:'4px 0',letterSpacing:'.06em'}}>{d}</div>)}
        <div style={{fontSize:10,fontWeight:700,color:'#475569',padding:'4px 0',textAlign:'center',letterSpacing:'.06em'}}>SEM</div>
      </div>
      {Array.from({length:Math.ceil(cells.length/7)},(_,row)=>(
        <div key={row} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr) 80px',gap:3,marginBottom:3}}>
          {Array.from({length:7},(_,col)=>{
            const d=cells[row*7+col];
            if(d===undefined||d===null)return <div key={col} style={{background:'rgba(255,255,255,.01)',borderRadius:10,minHeight:74,border:'1px solid rgba(255,255,255,.03)'}}/>;
            const key=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const tr=(trades||{})[key];
            return(
              <div key={col} className={`cal-day ${tr?tr.pnl>=0?'win-day':'loss-day':''}`}>
                <div className="cal-num">{d}</div>
                {tr&&<><div className={tr.pnl>=0?'cal-pnl-pos':'cal-pnl-neg'} style={{marginTop:6}}>{tr.pnl>=0?'+':''}{Math.abs(tr.pnl)>=1000?'$'+(tr.pnl/1000).toFixed(1)+'K':'$'+tr.pnl}</div><div style={{fontSize:10,color:'#475569',marginTop:2}}>{tr.trades} trades</div></>}
              </div>
            );
          })}
          <div className="week-sum">
            {ws[row]!==undefined?(<><div style={{fontSize:12,fontWeight:800,color:ws[row]>=0?'#10b981':'#ef4444',textShadow:ws[row]>=0?'0 0 8px rgba(16,185,129,.4)':'0 0 8px rgba(239,68,68,.4)'}}>{ws[row]>=0?'+':''}{Math.abs(ws[row])>=1000?'$'+(ws[row]/1000).toFixed(1)+'K':'$'+ws[row]}</div><div style={{fontSize:9,color:'#475569',marginTop:2}}>SEM {row+1}</div></>):<div style={{fontSize:10,color:'#1e2a3a'}}>—</div>}
          </div>
        </div>
      ))}
    </div>
  );
}

function App(){

  const [d,setD]=useState(DATA);

    const fetcher=async()=>{
      try{
        let upd={...DATA};
        try{const r=await fetch("dashboard_data.json");if(r.ok){const j=await r.json();upd={...upd,...j};}}catch(e){}
        try{
          const r2=await fetch("historial_trades.json");
          if(r2.ok){
            const h=await r2.json();

              const tot=h.length,wins=h.filter(t=>t.resultado==='win').length;
              upd.journal=[...h].reverse();upd.trades_hoy=tot;
              upd.win_rate=Math.round(wins/tot*100);
              upd.net_pnl=h.reduce((a,t)=>a+(t.pnl_num||0),0);
              const cal={};h.forEach(t=>{if(!cal[t.fecha])cal[t.fecha]={pnl:0,trades:0};cal[t.fecha].pnl+=t.pnl_num;cal[t.fecha].trades+=1;});
              upd.cal_trades=cal;
              upd.logs=h.slice(-6).map(hh=>({ts:hh.ts,msg:`Orden MT5 cerrada en ${hh.par}: ${hh.pnl}`,tipo:hh.resultado==='win'?'ok':'warn'})).reverse();
            }
          }
        }catch(e){}
        setD(upd);
      }catch(e){console.log("Esperando escrituras del bot...");}
    };
    fetcher();const id=setInterval(fetcher,2000);return()=>clearInterval(id);
  },[]);

  const SN=({id,label,icon})=>(
    <button className={`nav-item ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
      <span style={{width:15,height:15,display:'flex',flexShrink:0}}>{icon}</span>{label}
    </button>
  );
  const PH=({title,sub})=>(
    <div style={{marginBottom:22}}>
      <h2 style={{fontSize:20,fontWeight:800,color:'#f1f5f9',letterSpacing:'-.4px'}}>{title}</h2>
      {sub&&<p style={{fontSize:12,color:'#475569',marginTop:3}}>{sub}</p>}
    </div>
  );

  return(
    <>
    <div className="sidebar">
      <div className="sidebar-logo">
        <div className="logo-mark">
          <div className="logo-hex">LA</div>
          <div className="logo-text"><h1>LAROC AI</h1><p>Institutional Terminal</p></div>
        </div>
      </div>
      <div className="sidebar-nav">
        <div className="nav-section">Principal</div>
        <SN id="dashboard" label="Dashboard"  icon={Ic.grid}/>
        <SN id="bots"      label="Mis Bots"    icon={Ic.bot}/>
        <SN id="journal"   label="Journal"     icon={Ic.book}/>
        <SN id="analytics" label="Analytics"   icon={Ic.chart}/>
        <SN id="calendar"  label="Calendario"  icon={Ic.cal}/>
        <div className="nav-section">Sistema</div>
        <SN id="config"    label="Config"      icon={Ic.gear}/>
      </div>
      <div className="sidebar-footer">
        <div className="bot-status">
          <div className="bot-avatar">LA</div>
          <div><div style={{fontSize:12,fontWeight:700,color:'#f1f5f9'}}>LAROC Bot</div><div className="pulse-live"><div className="dot-live"/><span>Online</span></div></div>
        </div>
      </div>
    </div>

    <div className="main">
      <div className="topbar">
        <div style={{display:'flex',flexDirection:'column',gap:2}}>
          <div className="topbar-title">{tab==='dashboard'?'Dashboard':tab==='bots'?'Mis Bots':tab==='journal'?'Journal':tab==='analytics'?'Analytics':tab==='calendar'?'Calendario':'Configuración'}</div>
          <div className="topbar-sub">{tab==='dashboard'?'Vista general en tiempo real':'LAROC AI V2.0'}</div>
        </div>
        <div className="topbar-right">
          <div style={{display:'flex',gap:5}}>{['Hoy','7D','30D','YTD'].map((l,i)=><span key={l} className={`chip ${i===0?'active':''}`}>{l}</span>)}</div>
          <Clock/>
          <button className="btn btn-ghost" style={{padding:'7px 10px'}}><span style={{width:15,height:15,display:'flex'}}>{Ic.bell}</span></button>
          <button className="btn btn-primary"><span style={{width:13,height:13,display:'flex'}}>{Ic.spark}</span>Start Day</button>
        </div>
      </div>

      <div className="content">

        {/* ════ DASHBOARD — sin robot, layout denso y limpio ════ */}
        {tab==='dashboard'&&(
          <>
          {/* Fila 1 — 4 stat cards */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:14}}>
            <div className="stat-card card-accent-p fade-up-1">
              <div className="stat-label">{Ic.info} Balance de Cuenta</div>
              <div className="stat-val mono" style={{color:'#f1f5f9'}}>{typeof d.balance==='number'?fmt(d.balance):d.balance}</div>
              <div className="stat-sub"><span className="badge badge-green">LIVE</span><span style={{marginLeft:5}}>Funded Elite Account</span></div>
            </div>
            <div className="stat-card card-accent-c fade-up-2">
              <div className="stat-label">{Ic.info} P&L Historial (7D)</div>
              <div className="stat-val mono" style={{color:d.net_pnl>=0?'#10b981':'#ef4444',textShadow:d.net_pnl>=0?'0 0 20px rgba(16,185,129,.3)':'0 0 20px rgba(239,68,68,.3)'}}>${fmt(d.net_pnl)}</div>
              <div className="stat-sub">{d.trades_hoy} operaciones ejecutadas</div>
            </div>
            <div className="stat-card card-accent-g fade-up-3">
              <div className="stat-label">{Ic.info} Win Rate Real</div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div><div className="stat-val mono" style={{color:'#10b981',textShadow:'0 0 20px rgba(16,185,129,.3)'}}>{d.win_rate}%</div><div className="stat-sub">Efectividad</div></div>
                <Ring pct={d.win_rate} size={62} stroke={5} color={d.win_rate>=50?'#10b981':'#f59e0b'}/>
              </div>
            </div>
            <div className="stat-card fade-up-4">
              <div className="stat-label">{Ic.info} Avg Win / Loss</div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4}}>
                <span className="mono" style={{fontSize:20,fontWeight:800,color:'#10b981',textShadow:'0 0 12px rgba(16,185,129,.3)'}}>${d.avg_win}</span>
                <span style={{color:'#1e2a3a',fontSize:16}}>/</span>
                <span className="mono" style={{fontSize:20,fontWeight:800,color:'#ef4444',textShadow:'0 0 12px rgba(239,68,68,.3)'}}>${d.avg_loss}</span>
              </div>
              <div style={{display:'flex',gap:3,marginTop:8,height:4,borderRadius:2,overflow:'hidden'}}>
                <div style={{flex:d.avg_win||1,background:'#10b981',borderRadius:2}}/>
                <div style={{flex:d.avg_loss||1,background:'#ef4444',borderRadius:2}}/>
              </div>
            </div>
          </div>

          {/* Fila 2 — LAROC Score | Heatmap | Win% Line (3 columnas, sin hueco) */}
          <div style={{display:'grid',gridTemplateColumns:'240px 1fr 1fr',gap:12,marginBottom:12}}>
            {/* LAROC Score + Radar */}
            <div className="card">
              <div className="sec-hdr"><div className="sec-title">LAROC Score</div></div>
              <RadarChart data={d.radar}/>
              <div className="div"/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
                <div>
                  <div style={{fontSize:9,color:'#475569',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:4}}>Puntuación</div>
                  <div className="mono glow-text" style={{fontSize:28,fontWeight:900,background:'linear-gradient(135deg,#a78bfa,#06b6d4)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{d.laroc_score}</div>
                </div>
                <span className="badge badge-cyan">Top SMC</span>
              </div>
              <div className="score-bar-wrap" style={{marginTop:8}}><div className="score-bar" style={{width:d.laroc_score+'%'}}/></div>
            </div>

            {/* Tracker de Consistencia (heatmap) */}
            <div className="card">
              <div className="sec-hdr">
                <div className="sec-title">Tracker de Consistencia</div>
                <span className="badge badge-beta">M1/M15</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'18px 1fr',gap:4,marginBottom:12}}>
                <div style={{display:'flex',flexDirection:'column',justifyContent:'space-around'}}>
                  {['L','M','X','J','V','S','D'].map(l=><div key={l} className="mono" style={{fontSize:9,color:'#2a3347',height:13,display:'flex',alignItems:'center'}}>{l}</div>)}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(8,1fr)',gap:3}}>
                  {d.heatmap.slice(0,56).map((v,i)=><div key={i} className={`hm-cell hm-${Math.min(v,5)}`}/>)}
                </div>
              </div>
              <div className="div"/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:4}}>
                {[['Trades',d.trades_hoy,'#a78bfa'],['Exchanges',d.exchanges,'#06b6d4'],['Sharpe',d.sharpe,'#10b981']].map(([l,v,c])=>(
                  <div key={l} style={{background:'rgba(255,255,255,.03)',borderRadius:8,padding:'8px 10px',border:'1px solid var(--b1)',textAlign:'center'}}>
                    <div style={{fontSize:9,color:'#475569',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:3}}>{l}</div>
                    <div className="mono" style={{fontSize:15,fontWeight:700,color:c}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Métricas de crecimiento */}
            <div className="card">
              <div className="sec-hdr"><div className="sec-title">Métricas de Crecimiento</div></div>
              <div style={{height:155,marginBottom:10}}><WinLineChart wp={d.win_pct_chart} aw={d.avg_win_chart} al={d.avg_loss_chart}/></div>
              <div className="div"/>
              <div style={{display:'flex',gap:8}}>
                <span className="badge badge-green">WIN {d.win_rate}%</span>
                <span className="badge badge-red">DD {d.drawdown}%</span>
                <span className="badge badge-purple">SHARPE {d.sharpe}</span>
              </div>
            </div>
          </div>

          {/* Fila 3 — Balance chart + Módulos table */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1.1fr',gap:12,marginBottom:12}}>
            <div className="card">
              <div className="sec-hdr"><div className="sec-title">Curva de Rendimiento Estructural</div></div>
              <div style={{height:148}}><BalanceChart data={d.balance_chart}/></div>
            </div>
            <div className="card" style={{padding:0,overflow:'hidden'}}>
              <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,.05)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div className="sec-title">Estatus Módulos Activos</div><span className="badge badge-purple">LAROC V2.0</span>
              </div>
              <table className="tbl">
                <thead><tr><th>Par</th><th>Temporalidad</th><th>Estado</th><th>Win%</th></tr></thead>
                <tbody>
                  {d.bots.map(b=>(
                    <tr key={b.par}>
                      <td><div style={{display:'flex',alignItems:'center',gap:8}}>
                        <div className="avatar" style={{width:30,height:30,background:'linear-gradient(135deg,rgba(124,58,237,.2),rgba(6,182,212,.15))',color:'#a78bfa',fontSize:9}}>{b.par.slice(0,3)}</div>
                        <div><div style={{fontWeight:700,fontSize:12,color:'#f1f5f9'}}>{b.par}</div><div style={{fontSize:10,color:'#475569'}}>{b.exchange}</div></div>
                      </div></td>
                      <td><span className="badge badge-blue">M1/M15/H1</span></td>
                      <td><span style={{display:'flex',alignItems:'center',gap:5,fontSize:11}}><span style={{width:6,height:6,borderRadius:'50%',background:'#10b981',boxShadow:'0 0 6px #10b981',display:'inline-block'}}/><span style={{color:'#10b981'}}>Monitoreando</span></span></td>
                      <td><span className="mono" style={{color:'#a78bfa',fontWeight:700}}>{d.win_rate}%</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Fila 4 — Activo + Motor + Log */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1.4fr',gap:12}}>
            <div className="card" style={{display:'flex',alignItems:'center',gap:14}}>
              <div style={{width:46,height:46,borderRadius:12,background:'linear-gradient(135deg,#7c3aed,#06b6d4)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:800,boxShadow:'0 0 20px rgba(124,58,237,.4)',flexShrink:0}}>{(d.ultimo_activo||'EUR').slice(0,3)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:'#475569',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:4}}>Activo en Radar</div>
                <div className="mono" style={{fontSize:18,fontWeight:900,background:'linear-gradient(135deg,#a78bfa,#67e8f9)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'.06em'}}>{d.ultimo_activo}</div>
              </div>
              <span className="badge badge-green" style={{flexShrink:0}}>LIVE</span>
            </div>
            <div className="card">
              <div style={{fontSize:9,color:'#475569',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:8}}>Fase del Motor de Decisión</div>
              <Typing text={d.ultimo_status}/>
              <div style={{display:'flex',gap:6,marginTop:10}}>
                <span className="badge badge-green">ALGORITMO OK</span>
                <span className="badge badge-cyan">{d.exchanges} exchanges</span>
              </div>
            </div>
            <div className="card">
              <div className="sec-hdr"><div className="sec-title">Bitácora de Eventos Recientes</div><span className="badge badge-green">LIVE</span></div>
              <div style={{maxHeight:130,overflowY:'auto'}}>
                {d.logs.slice(0,5).map((l,i)=>(
                  <div key={i} className="log-row">
                    <span className="log-time">{l.ts}</span>
                    <span className={`badge ${l.tipo==='ok'?'badge-green':l.tipo==='warn'?'badge-amber':'badge-purple'}`} style={{flexShrink:0}}>{(l.tipo||'info').toUpperCase()}</span>
                    <span style={{color:'#94a3b8',flex:1}}>{l.msg}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
          </>
        )}

        {/* ════ BOTS ════ */}
        {tab==='bots'&&(
          <>
          <PH title="Configuración de Activos" sub="Estrategias SMC asignadas a cada par operativo"/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:14}}>
            {d.bots.map(b=>(
              <div key={b.par} className="card" style={{padding:22}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,rgba(124,58,237,.2),rgba(6,182,212,.15))',display:'flex',alignItems:'center',justifyContent:'center',color:'#a78bfa',fontSize:14,fontWeight:800,border:'1px solid rgba(124,58,237,.2)'}}>{b.par.slice(0,2)}</div>
                    <div><div style={{fontWeight:800,fontSize:16,color:'#f1f5f9'}}>{b.par}</div><div style={{fontSize:11,color:'#475569',marginTop:1}}>{b.exchange} · Window M1</div></div>
                  </div>
                  <span className="badge badge-green">ACTIVO</span>
                </div>
                <div className="div"/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  {[['Estrategia','SMC / ICT (2-Leg)'],['Filtro Adicional','Divergencia SMT Pro (Pearson)']].map(([k,v])=>(
                    <div key={k} style={{background:'rgba(255,255,255,.03)',borderRadius:10,padding:'10px 12px',border:'1px solid var(--b1)'}}>
                      <div style={{fontSize:9,color:'#475569',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5}}>{k}</div>
                      <div style={{fontWeight:700,fontSize:12,color:'#a78bfa'}}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          </>
        )}

        {/* ════ JOURNAL ════ */}
        {tab==='journal'&&(
          <>
          <PH title="Journal de Decisiones de Smart Money" sub="Historial automatizado y auditoría algorítmica de MetaTrader 5"/>
          <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:14}}>
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div className="sec-title">Registro Automatizado de Posiciones</div>
                <span className="badge badge-purple">{d.journal.length} operaciones en historial</span>
              </div>
              {d.journal.length===0?<p style={{color:'#2a3347',fontSize:13}}>No hay operaciones en los últimos 7 días.</p>:d.journal.map((e,idx)=><JEntry key={idx} e={e}/>)}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div className="card">
                <div className="sec-hdr"><div className="sec-title">Estadísticas del Mes</div></div>
                <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:14}}>
                  <Ring pct={d.win_rate} size={88} color="#10b981"/>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:'#10b981'}}>&#9650; {d.win_rate}% Ganados</div>
                    <div style={{fontSize:13,fontWeight:700,color:'#ef4444',marginTop:5}}>&#9660; {100-d.win_rate}% Perdidos</div>
                    <div className="mono" style={{fontSize:10,color:'#475569',marginTop:8}}>SHARPE: {d.sharpe} · DD: {d.drawdown}%</div>
                  </div>
                </div>
                <div style={{height:90}}><PnLChart data={d.pnl_chart}/></div>
              </div>
              <div className="card">
                <div className="sec-hdr"><div className="sec-title">Log del Sistema</div></div>
                <div style={{maxHeight:200,overflowY:'auto'}}>
                  {d.logs.slice(-8).reverse().map((l,i)=>(
                    <div key={i} className="log-row">
                      <span className="log-time">{l.ts}</span>
                      <span className={`badge ${l.tipo==='ok'?'badge-green':l.tipo==='warn'?'badge-amber':'badge-purple'}`} style={{flexShrink:0}}>{(l.tipo||'info').toUpperCase()}</span>
                      <span style={{color:'#94a3b8',flex:1}}>{l.msg}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
          </>
        )}

        {/* ════ ANALYTICS ════ */}
        {tab==='analytics'&&(
          <>
          <PH title="Métricas Avanzadas" sub="Análisis de comportamiento cuantitativo"/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:14}}>
            <div className="card"><div className="sec-hdr"><div className="sec-title">Rendimiento de Balance</div></div><div style={{height:180}}><BalanceChart data={d.balance_chart}/></div></div>
            <div className="card"><div className="sec-hdr"><div className="sec-title">Frecuencia de Aciertos</div></div><div style={{height:180}}><PnLChart data={d.pnl_chart}/></div></div>
          </div>
          </>
        )}

        {/* ════ CALENDARIO ════ */}
        {tab==='calendar'&&(
          <>
          <PH title="Calendario Financiero" sub="Mapeo diario de ganancias y pérdidas"/>
          <div className="card"><CalendarView trades={d.cal_trades}/></div>
          </>
        )}

        {/* ════ CONFIG — robot 3D aquí, llenando el espacio ════ */}
        {tab==='config'&&(
          <>
          <PH title="Parámetros Operativos del Sistema" sub="Variables institucionales inyectadas en LAROC AI V2.0"/>

          {/* Filtros — card superior */}
          <div className="card" style={{marginBottom:14}}>
            <div className="sec-hdr"><div className="sec-title">Filtros y Seguridad Activa</div></div>
            {[
              ['Killzones','Londres (02:00–04:00) · Nueva York (07:00–10:00)'],
              ['Protección de Noticias','Calendario de Forex Factory integrado (filtro de impacto High automático)'],
              ['Filtro de Confirmación','Correlación de Pearson por debajo de 0.40 para SMT Pro'],
              ['Gestión de Stop Loss','Jerarquía adaptativa (Opción 2 Sniper primero, Opción 1 Estructural como respaldo)'],
            ].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                <span style={{fontSize:13,color:'#94a3b8',fontWeight:500}}>{k}</span>
                <span style={{fontSize:12,color:'#a78bfa',fontWeight:600,maxWidth:'58%',textAlign:'right'}}>{v}</span>
              </div>
            ))}
          </div>

          {/* Robot 3D + métricas de sistema — fila inferior que llena el espacio */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:14}}>
            {/* Robot canvas */}
            <div className="robot-card" style={{height:300}}>
              <RobotCanvas/>
              <div style={{position:'absolute',bottom:14,left:16,display:'flex',alignItems:'center',gap:8}}>
                <div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(0,0,0,.55)',borderRadius:20,padding:'5px 14px',backdropFilter:'blur(8px)',border:'1px solid rgba(124,58,237,.3)'}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:'#10b981',boxShadow:'0 0 8px #10b981'}}/>
                  <span className="mono" style={{fontSize:10,color:'#a78bfa',letterSpacing:'.12em'}}>LAROC ENGINE · SMC/ICT ACTIVE</span>
                </div>
              </div>
              <div style={{position:'absolute',top:14,right:14,display:'flex',gap:6}}>
                <span className="badge badge-purple">SMC</span>
                <span className="badge badge-cyan">ICT</span>
              </div>
            </div>

            {/* Panel de métricas del sistema */}
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div className="card" style={{flex:1}}>
                <div className="sec-hdr"><div className="sec-title">Estado del Sistema</div></div>
                {[
                  ['Algoritmo','LAROC AI V2.0','#10b981'],
                  ['Motor','MetaTrader 5','#a78bfa'],
                  ['Pares activos',d.bots.length,'#06b6d4'],
                  ['Win Rate actual',d.win_rate+'%',d.win_rate>=50?'#10b981':'#f59e0b'],
                  ['Net P&L (7D)','$'+fmt(d.net_pnl),d.net_pnl>=0?'#10b981':'#ef4444'],
                  ['Drawdown',d.drawdown+'%','#ef4444'],
                ].map(([k,v,c])=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                    <span style={{fontSize:12,color:'#475569'}}>{k}</span>
                    <span className="mono" style={{fontSize:12,fontWeight:700,color:c}}>{v}</span>
                  </div>
                ))}
              </div>
              <div className="card">
                <div className="sec-hdr"><div className="sec-title">Fase del Motor</div></div>
                <Typing text={d.ultimo_status}/>
                <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
                  <span className="badge badge-green">ALGORITMO OK</span>
                  <span className="badge badge-cyan">{d.exchanges} exchanges</span>
                </div>
              </div>
            </div>
          </div>
          </>
        )}

      </div>
    </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
